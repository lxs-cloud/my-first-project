<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LXS Daily</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0e1a;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .stars::before,
        .stars::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(1px 1px at 20px 30px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 90px 40px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 160px 120px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1.5px 1.5px at 200px 200px, rgba(255,255,255,0.9), transparent),
                radial-gradient(1px 1px at 300px 80px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1.5px 1.5px at 400px 150px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 500px 250px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1px 1px at 600px 50px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1.5px 1.5px at 700px 300px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 100px 300px, rgba(255,255,255,0.7), transparent),
                radial-gradient(1px 1px at 250px 350px, rgba(255,255,255,0.5), transparent),
                radial-gradient(1.5px 1.5px at 350px 400px, rgba(255,255,255,0.8), transparent),
                radial-gradient(1px 1px at 450px 350px, rgba(255,255,255,0.6), transparent),
                radial-gradient(1px 1px at 550px 400px, rgba(255,255,255,0.7), transparent);
            background-size: 700px 450px;
            animation: twinkleStars 4s ease-in-out infinite alternate;
        }

        .stars::after {
            background-size: 500px 350px;
            animation-delay: 2s;
            opacity: 0.6;
        }

        @keyframes twinkleStars {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 3rem 2.5rem;
            animation: fadeIn 1s ease-out;
        }

        .galaxy-icon {
            display: inline-block;
            margin-bottom: 1.5rem;
            width: 140px;
            height: 140px;
        }

        .galaxy-icon svg {
            filter: drop-shadow(0 0 30px rgba(139, 92, 246, 0.4));
        }

        h1 {
            font-size: 2.8rem;
            color: #e2e8f0;
            margin-bottom: 0.5rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        .cards {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            padding: 2rem 2.5rem;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            min-width: 200px;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(139, 92, 246, 0.4);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.15), inset 0 0 0 1px rgba(139, 92, 246, 0.1);
        }

        .card.astro:hover {
            border-color: rgba(56, 189, 248, 0.4);
            box-shadow: 0 8px 32px rgba(56, 189, 248, 0.15), inset 0 0 0 1px rgba(56, 189, 248, 0.1);
        }

        .card-icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-icon svg {
            filter: drop-shadow(0 0 8px rgba(139, 92, 246, 0.3));
        }

        .card.astro .card-icon svg {
            filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.3));
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.3rem;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #64748b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .cards { flex-direction: column; align-items: center; }
            .card { width: 100%; max-width: 280px; }
            .container { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="container">
        <div class="galaxy-icon">
            <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <style>
                        @keyframes galaxySpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
                        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
                        .galaxy-body { animation: galaxySpin 30s linear infinite; transform-origin: 100px 100px; }
                        .pulse-star { animation: pulse 2.5s ease-in-out infinite; }
                    </style>
                    <radialGradient id="core">
                        <stop offset="0%" stop-color="#fffde0" stop-opacity="1"/>
                        <stop offset="20%" stop-color="#fef3c7" stop-opacity="0.9"/>
                        <stop offset="50%" stop-color="#c4b5fd" stop-opacity="0.5"/>
                        <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
                    </radialGradient>
                    <radialGradient id="diskGlow">
                        <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.4"/>
                        <stop offset="60%" stop-color="#6366f1" stop-opacity="0.15"/>
                        <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
                    </radialGradient>
                    <filter id="softBlur"><feGaussianBlur stdDeviation="2.5"/></filter>
                    <filter id="armBlur"><feGaussianBlur stdDeviation="1.8"/></filter>
                    <filter id="coreBloom"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
                </defs>
                <g class="galaxy-body">
                    <ellipse cx="100" cy="100" rx="80" ry="45" fill="url(#diskGlow)" filter="url(#softBlur)"/>
                    <path d="M 100 100 C 120 80, 155 75, 165 55 C 172 40, 160 30, 140 35" stroke="#7c3aed" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#armBlur)" opacity="0.6"/>
                    <path d="M 100 100 C 115 85, 145 88, 158 70 C 168 55, 175 45, 170 38" stroke="#38bdf8" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#armBlur)" opacity="0.45"/>
                    <path d="M 100 100 C 80 120, 45 125, 35 145 C 28 160, 40 170, 60 165" stroke="#7c3aed" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#armBlur)" opacity="0.6"/>
                    <path d="M 100 100 C 85 115, 55 112, 42 130 C 32 145, 25 155, 30 162" stroke="#38bdf8" stroke-width="5" fill="none" stroke-linecap="round" filter="url(#armBlur)" opacity="0.45"/>
                    <path d="M 100 100 C 90 75, 60 60, 45 55 C 35 52, 28 58, 32 68" stroke="#a78bfa" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#armBlur)" opacity="0.4"/>
                    <path d="M 100 100 C 110 125, 140 140, 155 145 C 165 148, 172 142, 168 132" stroke="#a78bfa" stroke-width="6" fill="none" stroke-linecap="round" filter="url(#armBlur)" opacity="0.4"/>
                    <ellipse cx="100" cy="100" rx="22" ry="12" fill="url(#core)" filter="url(#coreBloom)"/>
                    <ellipse cx="100" cy="100" rx="10" ry="6" fill="#fffde0" opacity="0.95"/>
                    <ellipse cx="100" cy="100" rx="4" ry="2.5" fill="#fff" opacity="1"/>
                    <circle cx="150" cy="62" r="1.2" fill="#e0e7ff" opacity="0.9" class="pulse-star"/>
                    <circle cx="160" cy="50" r="0.8" fill="#fff" opacity="0.7" class="pulse-star" style="animation-delay:0.5s"/>
                    <circle cx="55" cy="148" r="1.2" fill="#e0e7ff" opacity="0.9" class="pulse-star" style="animation-delay:1s"/>
                    <circle cx="42" cy="158" r="0.9" fill="#fff" opacity="0.75" class="pulse-star" style="animation-delay:1.5s"/>
                    <circle cx="50" cy="60" r="1" fill="#fff" opacity="0.8" class="pulse-star" style="animation-delay:0.3s"/>
                    <circle cx="155" cy="140" r="1" fill="#fff" opacity="0.8" class="pulse-star" style="animation-delay:1.8s"/>
                    <circle cx="130" cy="75" r="0.7" fill="#c4b5fd" opacity="0.7" class="pulse-star" style="animation-delay:2.2s"/>
                    <circle cx="70" cy="130" r="0.7" fill="#c4b5fd" opacity="0.7" class="pulse-star" style="animation-delay:0.8s"/>
                </g>
                <circle cx="20" cy="25" r="1" fill="#fff" opacity="0.5" class="pulse-star" style="animation-delay:0.2s"/>
                <circle cx="180" cy="30" r="1.2" fill="#fff" opacity="0.6" class="pulse-star" style="animation-delay:1.2s"/>
                <circle cx="15" cy="175" r="0.9" fill="#fff" opacity="0.5" class="pulse-star" style="animation-delay:2s"/>
                <circle cx="185" cy="170" r="1.1" fill="#fff" opacity="0.55" class="pulse-star" style="animation-delay:0.7s"/>
                <circle cx="30" cy="100" r="0.8" fill="#e0e7ff" opacity="0.4"/>
                <circle cx="175" cy="95" r="0.8" fill="#e0e7ff" opacity="0.4"/>
            </svg>
        </div>
        <h1>LXS Daily</h1>
        <p class="subtitle">AI & Astronomy News, Every Day</p>
        <div class="cards">
            <div class="card" onclick="window.location.href='./ai-daily/output/index.html'">
                <div class="card-icon">✨</div>
                <div class="card-title">AI 日报</div>
                <div class="card-desc">AI & Tech News</div>
            </div>
            <div class="card astro" onclick="window.location.href='./astro-daily/output/index.html'">
                <div class="card-icon">🔭</div>
                <div class="card-title">天文日报</div>
                <div class="card-desc">Astronomy & Space</div>
            </div>
        </div>
    </div>
</body>
</html>
