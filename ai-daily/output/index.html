<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Daily Reports</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .report-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .report-item {
            padding: 15px 20px;
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            border-radius: 6px;
            transition: all 0.3s;
            text-decoration: none;
            color: inherit;
        }

        .report-item:hover {
            background: #f0e6ff;
            border-left-color: #764ba2;
            transform: translateX(5px);
        }

        .report-item .date {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .report-item .status {
            font-size: 0.9em;
            color: #999;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📰 AI Daily Reports</h1>
            <p>AI 日报列表</p>
        </div>

        <div class="content">
            <div class="report-list">
                <a href="./ai-daily-2026-06-15.html" class="report-item">
                    <div class="date">📅 2026-06-15</div>
                    <div class="status">点击查看完整日报 →</div>
                </a>
                <a href="./ai-daily-2026-06-14.html" class="report-item">
                    <div class="date">📅 2026-06-14</div>
                    <div class="status">点击查看完整日报 →</div>
                </a>
                <a href="./ai-daily-2026-06-13.html" class="report-item">
                    <div class="date">📅 2026-06-13</div>
                    <div class="status">点击查看完整日报 →</div>
                </a>
            </div>
            <a href="../../" class="back-link">← 返回首页</a>
        </div>
    </div>
</body>
</html>
